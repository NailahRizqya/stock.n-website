{% extends 'layout.html' %}

{% block title %}Registrasi - Stock.n{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-16">
    <div class="w-full max-w-md px-6">
        <div class="bg-white rounded-[2rem] border border-gray-100 shadow-card p-8 sm:p-10 relative overflow-hidden">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full mx-auto mb-6 shadow-sm overflow-hidden">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="text-2xl font-bold text-heading mb-2">Buat Akun Baru ✨</h1>
                <p class="text-sm text-paragraph">Mulai kelola inventori Anda sendiri</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold mb-2 text-heading uppercase tracking-wider">Email (wajib @gmail.com)</label>
                    <input type="email" name="username" placeholder="contoh@gmail.com" 
                        pattern=".*@gmail\.com$" title="Harap gunakan alamat email @gmail.com"
                        class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400 text-sm transition-all shadow-sm" required>
                </div>
                
                <div>
                    <label class="block text-xs font-bold mb-2 text-heading uppercase tracking-wider">Password Bebas</label>
                    <input type="password" name="password" placeholder="Buat password" 
                        class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-blue-400 focus:outline-none focus:ring-1 focus:ring-blue-400 text-sm transition-all shadow-sm" required>
                </div>
                
                <button type="submit" class="w-full bg-blue-500 text-white py-3.5 rounded-2xl font-bold hover:bg-blue-600 hover:-translate-y-0.5 transition-all mt-6 shadow-md shadow-blue-200">
                    Daftar Sekarang
                </button>
            </form>
            
            <p class="text-center mt-8 text-sm text-paragraph">
                Sudah punya akun? <a href="{{ url_for('login') }}" class="text-blue-500 font-bold hover:underline">Masuk di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
