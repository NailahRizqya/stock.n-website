{% extends 'layout.html' %}

{% block title %}Login - Stock.n{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-16">
    <div class="w-full max-w-md px-6">
        <div class="bg-white rounded-[2rem] border border-gray-100 shadow-card p-8 sm:p-10 relative overflow-hidden">

            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full mx-auto mb-6 shadow-sm overflow-hidden">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo"
                        class="w-full h-full object-cover">
                </div>
                <h1 class="text-2xl font-bold text-heading mb-2">Selamat Datang! 👋</h1>
                <p class="text-sm text-paragraph">Masuk ke akun Stock.n Anda</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold mb-2 text-heading uppercase tracking-wider">Email
                        (@gmail.com)</label>
                    <input type="email" name="username" placeholder="contoh@gmail.com" pattern=".*@gmail\.com$"
                        title="Harap gunakan alamat email @gmail.com"
                        class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-all shadow-sm"
                        required>
                </div>

                <div>
                    <label class="block text-xs font-bold mb-2 text-heading uppercase tracking-wider">Password</label>
                    <input type="password" name="password" placeholder="••••••••"
                        class="w-full px-4 py-3.5 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary text-sm transition-all shadow-sm"
                        required>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-primary to-blue-500 text-white py-3.5 rounded-2xl font-bold hover:shadow-soft hover:-translate-y-0.5 transition-all mt-6">
                    Masuk ke Dashboard
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-paragraph">
                Belum punya akun? <a href="{{ url_for('register') }}"
                    class="text-primary font-bold hover:underline">Daftar di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
